<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagine Images | AI Art Marketplace</title>
<style>
body{margin:0;font-family:Inter,Arial,sans-serif;background:#0f1115;color:#fff}
header{padding:60px 20px;text-align:center;background:linear-gradient(135deg,#111,#1f2937)}
h1{font-size:3rem;margin:0}
.container{max-width:1300px;margin:auto;padding:30px}
.hero{display:grid;grid-template-columns:2fr 1fr;gap:30px}
.panel{background:#171a21;border-radius:18px;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:25px}
.card{background:#171a21;border-radius:14px;padding:15px}
.thumb{height:180px;border-radius:10px;background:linear-gradient(45deg,#374151,#6b7280);display:flex;align-items:center;justify-content:center}
button{background:#4f46e5;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
input{width:100%;padding:12px;border-radius:8px;border:none}
img{max-width:100%;border-radius:12px}
#cart ul{padding-left:18px}
</style>
</head>
<body>
<header>
<h1>Imagine Images</h1>
<p>Premium AI Artwork Marketplace</p>
</header>

<div class="container">
<div class="hero">
<div class="panel">
<h2>Featured Collection</h2>
<p>Browse and purchase unique AI-generated artwork.</p>
<div class="grid" id="gallery"></div>
</div>

<div class="panel">
<h2>Checkout</h2>
<p><b>Venmo:</b> @MorgenT-Baer</p>
<img src="IMG_5451.jpg" alt="Venmo QR">
<div id="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p>Total: $<span id="total">0</span></p>
<input id="email" type="email" placeholder="Enter your email">
<br><br>
<button onclick="checkout()">Complete Purchase</button>
<p id="msg"></p>
</div>
</div>
</div>
</div>

<script>
let total=0;
const gallery=document.getElementById('gallery');
for(let i=1;i<=20;i++){
 let price=19+i*3;
 let card=document.createElement('div');
 card.className='card';
 card.innerHTML=`<div class="thumb">Artwork ${i}</div>
 <h3>AI Artwork ${i}</h3>
 <p>$${price}</p>
 <button onclick="addItem('AI Artwork ${i}',${price})">Add to Cart</button>`;
 gallery.appendChild(card);
}
function addItem(name,price){
 total+=price;
 document.getElementById('total').textContent=total;
 let li=document.createElement('li');
 li.textContent=name+' - $'+price;
 document.getElementById('cartItems').appendChild(li);
}
<script>
function checkout() {

    const email =
        document.getElementById("email").value.trim();

    if (!email) {
        alert("Please enter your email.");
        return;
    }

    const cartItems =
        document.querySelectorAll("#cartItems li");

    if (cartItems.length === 0) {
        alert("Your cart is empty.");
        return;
    }

    let items = [];

    cartItems.forEach(item => {
        items.push(item.textContent);
    });

    emailjs.send(
        "service_26cd2g5",
        "template_h999a2v",
        {
            customer_email: email,
            order_items: items.join("\\n"),
            order_total: "$" + total
        }
    )
    .then(function() {

        document.getElementById("msg").innerHTML = `
            <h3>Order Submitted!</h3>
            <p>
            Send your payment to
            <strong>@MorgenT-Baer</strong>
            using the Venmo QR code.
            </p>
            <p>
            Once payment is confirmed,
            your artwork will be delivered
            to ${email}.
            </p>
        `;

        cart = [];
        total = 0;

        document.getElementById("total").textContent = "0";
        document.getElementById("cartItems").innerHTML = "";

    })
    .catch(function(error) {
        console.error(error);
        alert("Failed to send order.");
    });

}
 <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init({
    publicKey: "IlkfWWs2z_u0vhsvz"
});
</script>



</script>
</body>
</html>
